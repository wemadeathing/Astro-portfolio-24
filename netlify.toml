[build]
  command = "npm run build"
  publish = "dist"

# Force www (www.nasifsalaam.com) -> apex (nasifsalaam.com) so requests match the
# canonical URLs declared in <link rel="canonical">. The Netlify dashboard has
# nasifsalaam.com set as the primary domain; redirecting in the same direction
# avoids the ERR_TOO_MANY_REDIRECTS loop that occurred when these rules pointed
# the other way.
[[redirects]]
  from = "https://www.nasifsalaam.com/*"
  to = "https://nasifsalaam.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.nasifsalaam.com/*"
  to = "https://nasifsalaam.com/:splat"
  status = 301
  force = true

# Rate limiting for chat API endpoint
# Limits: 10 requests per minute per IP (reduced to prevent API quota exhaustion)
[[rate_limit]]
  path = "/api/chat"
  window_limit = 10
  window_size = 60
  aggregator = "ip"
  status_code = 429
  custom_message = "Too many requests. Please wait a moment and try again."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://api.web3forms.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com" 
